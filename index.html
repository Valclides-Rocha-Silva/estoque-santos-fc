<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Estoque — Santos FC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ── DARK ── */
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#181818;
  --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.18);
  --text:#f0f0ee;--text2:#888880;--text3:#555550;
  --accent:#c8a84b;--accent2:#a08530;
  --green:#4a9e6e;--green-bg:rgba(74,158,110,0.12);
  --red:#c45a5a;--red-bg:rgba(196,90,90,0.12);
  --amber:#c8883a;--amber-bg:rgba(200,136,58,0.12);
  --radius:10px;--radius-lg:14px;
  --shadow:0 10px 30px rgba(0,0,0,0.35);
  --topbar-bg:rgba(10,10,10,0.75);
}

/* ── LIGHT ── */
:root.light{
  --bg:#f4f4f2;--bg2:#ffffff;--bg3:#ebebea;
  --border:rgba(0,0,0,0.09);--border-hover:rgba(0,0,0,0.20);
  --text:#1a1a18;--text2:#66665e;--text3:#aaaaaa;
  --accent:#a08530;--accent2:#7a6320;
  --green:#2d7a52;--green-bg:rgba(45,122,82,0.10);
  --red:#a03a3a;--red-bg:rgba(160,58,58,0.10);
  --amber:#a06020;--amber-bg:rgba(160,96,32,0.10);
  --topbar-bg:rgba(255,255,255,0.75);
}

/* GLOBAL */
body{
  font-family:'Sora',sans-serif;
  background:linear-gradient(180deg,var(--bg),#050505);
  color:var(--text);
  transition:all .25s;
}

/* TOPBAR MELHORADA */
.topbar{
  backdrop-filter:blur(18px);
  box-shadow:0 2px 20px rgba(0,0,0,0.3);
}

/* CARDS MAIS PREMIUM */
.scard{
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  box-shadow:var(--shadow);
  transition:all .2s ease;
}
.scard:hover{
  transform:translateY(-2px);
}

/* INPUT MODERNO */
input[type=text].search,
.form-input{
  transition:all .2s;
}
input[type=text].search:focus,
.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(200,168,75,0.15);
}

/* TABELA MAIS CLEAN */
tbody tr{
  transition:all .15s ease;
}
tbody tr:hover td{
  background:rgba(255,255,255,0.02);
}

/* BOTÕES PREMIUM */
.btn{
  transition:all .15s ease;
}
.btn:hover{
  transform:translateY(-1px);
}
.btn:active{
  transform:scale(.96);
}

/* BOTÃO PRINCIPAL */
.btn.accent-btn{
  box-shadow:0 6px 20px rgba(200,168,75,0.25);
}

/* BADGES MAIS SUAVES */
.badge{
  backdrop-filter:blur(4px);
}

/* MODAL MAIS BONITO */
.modal{
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:fadeIn .2s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* TOAST MELHORADO */
.toast{
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

/* SCROLLBAR CLEAN */
::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.15);
}

/* MOBILE */
@media(max-width:768px){
  .scard{
    box-shadow:none;
  }
}
</style>
</head>

    <div class="section" id="section-historico">

</div>

<!-- MODAL NOVO PRODUTO -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalOutside(event,'modal-backdrop')">

    <div class="modal-title">Novo produto</div>
    <div class="form-group"><label class="form-label">Descrição</label><input type="text" class="form-input" id="m-name" placeholder="Nome do produto" /></div>
    <div class="form-row">

      <div class="form-group"><label class="form-label">Qtd. inicial</label><input type="number" class="form-input" id="m-qty" min="0" placeholder="0" /></div>
      <div class="form-group"><label class="form-label">Unidade</label><input type="text" class="form-input" id="m-unit" placeholder="UN/PT/GL" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-backdrop')">Cancelar</button>
      <button class="btn accent-btn" onclick="addProduct()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL RESET -->
<div class="modal-backdrop" id="reset-backdrop" onclick="closeModalOutside(event,'reset-backdrop')">

let products=[],history=[],filtered=[];
let page=0,openId=null,openType=null;
const PER_PAGE=15;

// ── TEMA ──
function applyTheme(t){
  document.documentElement.classList.toggle('light',t==='light');
  document.getElementById('theme-btn').textContent=t==='light'?'🌙':'☀️';
  localStorage.setItem('sfc_theme',t);
}
function toggleTheme(){applyTheme(document.documentElement.classList.contains('light')?'dark':'light');}
applyTheme(localStorage.getItem('sfc_theme')||'dark');

// ── SYNC ──
function setSyncStatus(s){document.getElementById('sync-dot').className='sync-dot '+s;}
function status(p){if(p.qty===0)return 'crit';if(p.min>0&&p.qty<=p.min)return 'low';return 'ok';}
function statusBadge(p){const s=status(p);return `<span class="badge ${s}">${{ok:'OK',low:'Baixo',crit:'Sem estoque'}[s]}</span>`;}

// ── INIT ──
async function init(){
  try{
    const {data:ex,error:e0}=await sb.from('produtos').select('id').limit(1);
    if(e0)throw e0;
    if(!ex||ex.length===0){
      setSyncStatus('syncing');
      document.querySelector('.loading-text').textContent='Populando banco pela primeira vez...';
      const {error:ei}=await sb.from('produtos').insert(PRODUCTS_RAW.map(r=>({cod:r[0],name:r[1],unit:r[2],qty:0,min:0})));
      if(ei)throw ei;
    }
    await Promise.all([loadProducts(),loadHistory()]);

    // ── REALTIME: atualiza produto individualmente sem recarregar tudo ──
    sb.channel('rt-produtos')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'produtos'},(payload)=>{
        const updated=payload.new;
        const idx=products.findIndex(p=>p.id===updated.id);
        if(idx!==-1){products[idx]={...products[idx],...updated};applyFilter();}
        else{loadProducts();}
        setSyncStatus('synced');
      })
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'produtos'},(payload)=>{
        products.push(payload.new);
        products.sort((a,b)=>a.name.localeCompare(b.name));
        applyFilter();setSyncStatus('synced');
      })
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'produtos'},(payload)=>{
        products=products.filter(p=>p.id!==payload.old.id);
        applyFilter();setSyncStatus('synced');
      })
      .subscribe();

    // ── REALTIME: novo item no histórico ──
    sb.channel('rt-historico')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'historico'},(payload)=>{
        history.unshift(payload.new);
        if(document.getElementById('section-historico').classList.contains('active'))renderHistory();
        renderSummary();
      })
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'historico'},()=>{
        loadHistory();
      })
      .subscribe();

    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    setSyncStatus('synced');
  }catch(e){
    console.error(e);setSyncStatus('error');
    document.querySelector('.loading-text').textContent='Erro ao conectar. Verifique sua internet.';
  }
}

async function loadProducts(){
  const {data,error}=await sb.from('produtos').select('*').order('name');
  if(!error&&data){products=data;applyFilter();setSyncStatus('synced');}
}
async function loadHistory(){
  const {data,error}=await sb.from('historico').select('*').order('created_at',{ascending:false}).limit(300);
  if(!error&&data){history=data;if(document.getElementById('section-historico').classList.contains('active'))renderHistory();renderSummary();}
}

// ── FILTER/PAGE ──
function applyFilter(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const st=document.getElementById('filter-status').value;
  filtered=products.filter(p=>{
    const mq=!q||p.name.toLowerCase().includes(q)||(p.cod||'').includes(q);
    return mq&&(!st||status(p)===st);
  });
  page=0;render();
}
function changePage(d){const max=Math.ceil(filtered.length/PER_PAGE)-1;page=Math.max(0,Math.min(max,page+d));render();}

// ── MOVE ──
function toggleMove(id,type){
  openId=(openId===id&&openType===type)?null:id;
  openType=(openId===null)?null:type;
  render();
}

async function applyMove(id,type){
  const p=products.find(x=>x.id===id);if(!p)return;
  const qtyEl=document.getElementById('mv-qty-'+id);
  const obsEl=document.getElementById('mv-obs-'+id);
  const qty=parseInt(qtyEl.value)||0;
  const obs=obsEl?obsEl.value.trim():'';
  if(qty<=0){qtyEl.focus();return;}
  if(type==='out'&&qty>p.qty){
    toast('Quantidade insuficiente.','red');
    qtyEl.style.borderColor='var(--red)';setTimeout(()=>qtyEl.style.borderColor='',1200);return;
  }
  setSyncStatus('syncing');
  // Fecha painel e atualiza localmente IMEDIATAMENTE
  const before=p.qty;
  const after=type==='in'?p.qty+qty:p.qty-qty;
  p.qty=after; // atualiza local antes da resposta do servidor
  openId=null;openType=null;
  render(); // re-renderiza na hora
  toast(type==='in'?`+${qty} ${p.unit} → ${p.name}`:`-${qty} ${p.unit} → ${p.name}`,type==='in'?'green':'red');
  try{
    const now=new Date();
    const timeStr=now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const {error:e1}=await sb.from('produtos').update({qty:after}).eq('id',id);
    if(e1)throw e1;
    const {error:e2}=await sb.from('historico').insert({product:p.name,cod:p.cod,unit:p.unit,type,qty,before,after,obs,time:timeStr});
    if(e2)throw e2;
  }catch(e){
    console.error(e);p.qty=before;render(); // reverte se erro
    setSyncStatus('error');toast('Erro ao salvar. Revertido.','red');
  }
}

async function updateMin(id,val){
  const p=products.find(x=>x.id===id);
  if(p){p.min=parseInt(val)||0;renderSummary();}
  setSyncStatus('syncing');
  const {error}=await sb.from('produtos').update({min:parseInt(val)||0}).eq('id',id);
  if(error)setSyncStatus('error');
}

// ── RENDER ──
function render(){
  renderSummary();
  const slice=filtered.slice(page*PER_PAGE,page*PER_PAGE+PER_PAGE);
  const tbody=document.getElementById('tbody');
  const emptyEl=document.getElementById('empty-msg');
  if(filtered.length===0){emptyEl.style.display='';tbody.innerHTML='';}
  else emptyEl.style.display='none';
  tbody.innerHTML=slice.map(p=>{
    const isOpen=openId===p.id;const t=openType;
    return `<tr>
      <td class="cod">${p.cod||'—'}</td>
      <td class="prod-name">${p.name}</td>
      <td class="unit-cell">${p.unit}</td>
      <td class="qty-cell">${p.qty}</td>
      <td><input class="min-edit" type="number" min="0" value="${p.min||0}" onchange="updateMin('${p.id}',this.value)" /></td>
      <td>${statusBadge(p)}</td>
      <td><div class="action-btns">
        <button class="btn sm in-btn" onclick="toggleMove('${p.id}','in')">+ Entrada</button>
        <button class="btn sm out-btn" onclick="toggleMove('${p.id}','out')">− Saída</button>
      </div></td>
    </tr>
    ${isOpen?`<tr><td colspan="7" style="padding:0;"><div class="move-panel open">
      <span class="move-label">${t==='in'?'Entrada:':'Saída:'}</span>
      <input type="number" min="1" class="qty" id="mv-qty-${p.id}" placeholder="Qtd" />
      <input type="text" class="obs" id="mv-obs-${p.id}" placeholder="Observação (opcional)" />
      <button class="btn sm ${t==='in'?'in-btn':'out-btn'}" onclick="applyMove('${p.id}','${t}')">${t==='in'?'↑ Confirmar':'↓ Confirmar'}</button>
      <button class="btn sm" onclick="toggleMove('${p.id}','${t}')">Cancelar</button>
    </div></td></tr>`:''}`;
  }).join('');
  const total=filtered.length;const maxPage=Math.ceil(total/PER_PAGE);
  document.getElementById('pag-info').textContent=`Pág ${page+1}/${Math.max(1,maxPage)} · ${total} itens`;
  document.getElementById('btn-prev').disabled=page===0;
  document.getElementById('btn-next').disabled=page>=maxPage-1;
}

function renderSummary(){
  const tot=products.length,ok=products.filter(p=>status(p)==='ok').length,
    low=products.filter(p=>status(p)==='low').length,crit=products.filter(p=>status(p)==='crit').length;
  document.getElementById('summary').innerHTML=`
    <div class="scard"><div class="scard-label">Total</div><div class="scard-value accent">${tot}</div></div>
    <div class="scard"><div class="scard-label">OK</div><div class="scard-value ok">${ok}</div></div>
    <div class="scard"><div class="scard-label">Baixo</div><div class="scard-value low">${low}</div></div>
    <div class="scard"><div class="scard-label">Zerado</div><div class="scard-value crit">${crit}</div></div>
    <div class="scard"><div class="scard-label">Movimentos</div><div class="scard-value">${history.length}</div></div>`;
}

function showSection(name,el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  if(name==='historico')renderHistory();
}

function renderHistory(){
  const list=document.getElementById('hist-list');
  if(history.length===0){list.innerHTML='<div class="empty">Nenhum movimento ainda.</div>';return;}
  list.innerHTML=history.map(h=>`
    <div class="hist-item">
      <div class="hist-dot ${h.type}">${h.type==='in'?'↑':'↓'}</div>
      <div class="hist-body">
        <div><span class="hist-prod">${h.product}</span><span class="hist-cod">${h.cod||''}</span>${h.obs?`<span class="hist-obs">— ${h.obs}</span>`:''}</div>
        <div class="hist-meta">${h.time||''} · ${h.before}→${h.after} ${h.unit}</div>
      </div>
      <div class="hist-qty" style="color:${h.type==='in'?'var(--green)':'var(--red)'};">${h.type==='in'?'+':'−'}${h.qty} ${h.unit}</div>
    </div>`).join('');
}

// ── MODALS ──
function openModal(){document.getElementById('modal-backdrop').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}
function openResetModal(){
  document.getElementById('reset-confirm').value='';
  document.getElementById('reset-confirm').className='form-input confirm-input';
  document.getElementById('reset-confirm-btn').disabled=true;
  document.getElementById('reset-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('reset-confirm').focus(),50);
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeModalOutside(e,id){if(e.target===document.getElementById(id))closeModal(id);}

function checkResetInput(){
  const val=document.getElementById('reset-confirm').value;
  const ok=val==='RESETAR';
  document.getElementById('reset-confirm-btn').disabled=!ok;
  document.getElementById('reset-confirm').className='form-input confirm-input'+(val===''?'':(ok?' valid':' invalid'));
}

async function doReset(){
  closeModal('reset-backdrop');setSyncStatus('syncing');
  toast('Resetando...','amber');
  try{
    const {error:e1}=await sb.from('produtos').update({qty:0}).gte('qty',0);
    if(e1)throw e1;
    const {error:e2}=await sb.from('historico').delete().gte('id','00000000-0000-0000-0000-000000000000');
    if(e2)throw e2;
    // Atualiza local imediatamente
    products.forEach(p=>p.qty=0);
    history=[];
    applyFilter();renderHistory();
    toast('Estoque resetado!','green');setSyncStatus('synced');
  }catch(e){console.error(e);setSyncStatus('error');toast('Erro ao resetar.','red');}
}

async function addProduct(){
  const name=document.getElementById('m-name').value.trim();
  const cod=document.getElementById('m-cod').value.trim();
  const qty=parseInt(document.getElementById('m-qty').value)||0;
  const unit=document.getElementById('m-unit').value.trim()||'UN';
  if(!name){document.getElementById('m-name').focus();return;}
  setSyncStatus('syncing');
  const {data,error}=await sb.from('produtos').insert({cod:cod||'—',name,unit,qty,min:0}).select().single();
  if(error){setSyncStatus('error');toast('Erro ao adicionar.','red');return;}
  // Adiciona localmente imediatamente
  if(data){products.push(data);products.sort((a,b)=>a.name.localeCompare(b.name));applyFilter();}
  document.getElementById('m-name').value='';document.getElementById('m-cod').value='';
  document.getElementById('m-qty').value='';document.getElementById('m-unit').value='';
  closeModal('modal-backdrop');
  toast(`"${name}" adicionado!`,'green');setSyncStatus('synced');
}

function exportCSV(){
  const csv=[['Código','Descrição','Unidade','Quantidade','Mínimo','Status'],
    ...products.map(p=>[p.cod||'',p.name,p.unit,p.qty,p.min||0,status(p)==='ok'?'OK':status(p)==='low'?'Baixo':'Sem estoque'])
  ].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='estoque_santos_fc.csv';a.click();
  toast('CSV exportado!','green');
}

let toastTimer;
function toast(msg,color){
  const t=document.getElementById('toast');
  document.getElementById('toast-dot').style.background={green:'var(--green)',red:'var(--red)',amber:'var(--amber)'}[color]||'var(--green)';
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal('modal-backdrop');closeModal('reset-backdrop');openId=null;openType=null;render();}
});
init();
</script>
</body>
</html>
